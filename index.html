    <!-- PWA / Tela inicial iPhone — manifest injetado antes de qualquer fetch do browser -->
    <script>
      (function () {
        var isPainel = window.location.pathname.startsWith('/painel');
        var h = document.head;
        function injectLink(rel, href) {
          var el = document.createElement('link');
          el.rel = rel; el.href = href;
          h.appendChild(el);
        }
        function injectMeta(name, content) {
          var el = document.createElement('meta');
          el.name = name; el.content = content;
          h.appendChild(el);
        }
        injectLink('manifest', isPainel ? '/painel.webmanifest' : '/site.webmanifest');
        injectLink('apple-touch-icon', '/painel-icon.png');
        injectMeta('apple-mobile-web-app-capable', 'yes');
        injectMeta('apple-mobile-web-app-status-bar-style', 'black-translucent');
        injectMeta('apple-mobile-web-app-title', isPainel ? 'Painel MK' : 'Agendamento');
        injectMeta('theme-color', isPainel ? '#5B2D8E' : '#6d3263');
      })();
    </script>

    <!-- Fontes críticas: só o corpo do texto bloqueia; títulos carregam depois -->

    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/jost-400-n-latin-ext.woff2" />

    <!-- Conexões antecipadas para o GA (carregado após o load) -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />

    <!-- Google Analytics 4 — dataLayer inicia já; script carrega após o load -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7FQ0YH08X1');
      function __loadGA(){
        if (window.__gaLoaded) return; window.__gaLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-7FQ0YH08X1';
        document.head.appendChild(s);
      }
      if (document.readyState === 'complete') { setTimeout(__loadGA, 1500); }
      else { window.addEventListener('load', function(){ setTimeout(__loadGA, 1500); }); }
    </script>
